<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 660" width="420" height="660" role="img" aria-label="Developer ID Card Lanyard">
<title>Developer — swinging ID badge</title>
<defs>
<style type="text/css"><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&family=Outfit:wght@800&display=swap');
text{font-family:'Fira Code','SFMono-Regular',Consolas,monospace}
.strap-text{font-family:'Outfit',sans-serif}
@keyframes settle{0%{transform:rotate(0deg) translateY(-660px)}18%{transform:rotate(0deg) translateY(0)}30%{transform:rotate(13deg)}46%{transform:rotate(-9deg)}62%{transform:rotate(6deg)}78%{transform:rotate(-3.5deg)}92%{transform:rotate(1.5deg)}100%{transform:rotate(0deg)}}
@keyframes sway{0%,100%{transform:rotate(-3.2deg)}50%{transform:rotate(3.2deg)}}
@keyframes cardWobble{0%,100%{transform:rotate(1.6deg)}50%{transform:rotate(-1.6deg)}}
@keyframes shine{0%{transform:translateX(-340px) skewX(-18deg)}55%,100%{transform:translateX(420px) skewX(-18deg)}}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:1;transform:scale(1)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}12%{transform:scale(1.25)}24%{transform:scale(1)}36%{transform:scale(1.15)}48%{transform:scale(1)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.settle{transform-origin:210px 6px;animation:settle 3.4s cubic-bezier(.34,1.1,.5,1) forwards}
.sway{transform-origin:210px 6px;animation:sway 4.2s ease-in-out 3.4s infinite}
.wob{transform-origin:210px 300px;animation:cardWobble 4.2s ease-in-out 3.4s infinite}
.shine{animation:shine 4.5s ease-in-out 3.6s infinite}
.tw{transform-box:fill-box;transform-origin:center;animation:twinkle 2.8s ease-in-out infinite}
.hb{transform-box:fill-box;transform-origin:center;animation:heartBeat 2.4s ease-in-out infinite}
]]></style>
<linearGradient id="strapg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#1d4ed8"/><stop offset="50%" stop-color="#818cf8"/><stop offset="100%" stop-color="#1d4ed8"/>
</linearGradient>
<linearGradient id="cardg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#020617"/>
</linearGradient>
<linearGradient id="cardborder" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%"><animate attributeName="stop-color" values="#3b82f6;#818cf8;#3b82f6" dur="6s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#818cf8;#3b82f6;#818cf8" dur="6s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#cbd5e1"/><stop offset="45%" stop-color="#94a3b8"/><stop offset="55%" stop-color="#64748b"/><stop offset="100%" stop-color="#475569"/>
</linearGradient>
<linearGradient id="shineg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#fff" stop-opacity="0"/><stop offset="50%" stop-color="#fff" stop-opacity=".14"/><stop offset="100%" stop-color="#fff" stop-opacity="0"/>
</linearGradient>
<radialGradient id="lglow"><stop offset="0%" stop-color="#818cf8" stop-opacity=".16"/><stop offset="100%" stop-color="#818cf8" stop-opacity="0"/></radialGradient>
<filter id="glow2"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="cardShadow" x="-30%" y="-30%" width="160%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#000" flood-opacity=".55"/></filter>
<clipPath id="cardclip"><rect x="82" y="298" width="256" height="330" rx="20"/></clipPath>
</defs>

<circle cx="210" cy="440" r="230" fill="url(#lglow)"><animate attributeName="r" values="230;250;230" dur="5s" repeatCount="indefinite"/></circle>

<g class="tw" style="animation-delay:.5s"><path d="M60 200l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#93c5fd"/></g>
<g class="tw" style="animation-delay:1.6s"><path d="M372 300l2.4 6.4 6.4 2.4-6.4 2.4-2.4 6.4-2.4-6.4-6.4-2.4 6.4-2.4z" fill="#c4b5fd"/></g>
<g class="tw" style="animation-delay:2.7s"><path d="M52 480l2.4 6.4 6.4 2.4-6.4 2.4-2.4 6.4-2.4-6.4-6.4-2.4 6.4-2.4z" fill="#818cf8"/></g>
<g class="hb" style="animation-delay:1s"><path d="M368 480 c-4-9-17-7-17 3 0 7 10 13 17 18 7-5 17-11 17-18 0-10-13-12-17-3z" fill="#3b82f6" opacity=".8" filter="url(#glow2)"/></g>

<!-- pendulum: settle then sway -->
<g class="settle"><g class="sway">

  <!-- Strap -->
  <g>
    <path d="M191 -6 L229 -6 L226 236 L194 236 Z" fill="url(#strapg)"/>
    <line x1="196" y1="0" x2="198.5" y2="234" stroke="#fff" stroke-opacity=".55" stroke-width="1" stroke-dasharray="4 3"/>
    <line x1="224" y1="0" x2="221.5" y2="234" stroke="#fff" stroke-opacity=".55" stroke-width="1" stroke-dasharray="4 3"/>
    <text x="0" y="0" font-size="10.5" font-weight="bold" fill="#fff" opacity=".92" letter-spacing="2" transform="translate(214,18) rotate(90)" class="strap-text">DEVELOPER ♥ CREATOR ♥ DESIGNER</text>
  </g>

  <!-- Clasp + ring -->
  <rect x="188" y="232" width="44" height="26" rx="6" fill="url(#metal)" stroke="#3c414e" stroke-width="1"/>
  <rect x="199" y="238" width="22" height="7" rx="3.5" fill="#1e293b"/>
  <circle cx="210" cy="272" r="14" fill="none" stroke="url(#metal)" stroke-width="5.5"/>

  <!-- Card (secondary wobble) -->
  <g class="wob">
    <rect x="82" y="298" width="256" height="330" rx="20" fill="url(#cardg)" stroke="url(#cardborder)" stroke-width="2" filter="url(#cardShadow)"/>
    <!-- slot -->
    <rect x="180" y="310" width="60" height="10" rx="5" fill="#020617" stroke="#1e293b" stroke-width="1"/>

    <g clip-path="url(#cardclip)">
      <!-- header band -->
      <rect x="82" y="298" width="256" height="34" fill="#0f172a" opacity=".7"/>
      <text x="98" y="320" font-size="9" fill="#94a3b8" letter-spacing="1.5">DEVELOPER ID</text>
      <text x="322" y="320" text-anchor="end" font-size="9" fill="#3b82f6" letter-spacing="1.5">DEV-2026</text>

      <!-- avatar -->
      <circle cx="210" cy="412" r="59" fill="none" stroke="url(#cardborder)" stroke-width="2.5"/>
      <image x="154" y="356" width="112" height="112" href="{AVATAR_BASE64}"/>

      <!-- name & details -->
      <text x="210" y="500" text-anchor="middle" font-size="16" fill="#e2e8f0" font-weight="bold" letter-spacing="1">YOUR NAME</text>
      <text x="210" y="522" text-anchor="middle" font-size="10.5" fill="#3b82f6" font-weight="bold">FULL STACK DEVELOPER</text>

      <line x1="102" y1="540" x2="318" y2="540" stroke="#1e293b" stroke-width="1"/>

      <!-- bio line -->
      <text x="210" y="562" text-anchor="middle" font-size="8.5" fill="#94a3b8">"Building modern digital realities."</text>

      <rect x="120" y="582" width="180" height="24" rx="12" fill="#020617" stroke="#1e293b" stroke-width="1"/>
      <text x="210" y="598" text-anchor="middle" font-size="10.5" fill="#818cf8" font-weight="bold">ACTIVE MEMB</text>

      <!-- gloss reflection -->
      <path d="M-100 298 L160 298 L100 628 L-160 628 Z" fill="url(#shineg)" class="shine"/>
    </g>
  </g>

</g></g>
</svg>
