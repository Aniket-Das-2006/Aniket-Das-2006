  <text x="538" y="612" text-anchor="middle" font-size="11.5" fill="#64748b">👥 Followers</text>
</g>
<text class="st" x="118" y="640" text-anchor="middle" font-size="18" font-weight="bold" fill="#2563eb" filter="url(#glow)" style="animation:fadeIn .4s ease 6.6s forwards">20+</text>
<text class="st" x="258" y="640" text-anchor="middle" font-size="18" font-weight="bold" fill="#4f46e5" filter="url(#glow)" style="animation:fadeIn .4s ease 6.75s forwards">1000+</text>
<text class="st" x="398" y="640" text-anchor="middle" font-size="18" font-weight="bold" fill="#3b82f6" filter="url(#glow)" style="animation:fadeIn .4s ease 6.9s forwards">150+</text>
<text class="st" x="538" y="640" text-anchor="middle" font-size="18" font-weight="bold" fill="#7c3aed" filter="url(#glow)" style="animation:fadeIn .4s ease 7.05s forwards">100+</text>

<!-- ================= RIGHT: ILLUSTRATION ================= -->
<circle cx="1000" cy="440" r="270" fill="url(#girlGlow)"><animate attributeName="r" values="270;292;270" dur="5s" repeatCount="indefinite"/></circle>
