<text class="ltr name-text" x="48" y="196" font-size="54" font-weight="900" fill="url(#nameg)" filter="url(#glow)" style="animation-delay:1.60s">YOUR NAME</text>

<g class="hb" style="animation-delay:3s"><path d="M410 168 c-5-11-21-9-21 4 0 9 12 16 21 22 9-6 21-13 21-22 0-13-16-15-21-4z" fill="#2563eb" opacity=".95"/></g>

<!-- Cycling roles -->
<text clip-path="url(#r1)" x="48" y="241" font-size="17" fill="#4f46e5" filter="url(#glow)">&lt; Full Stack Developer /&gt;</text>
<text clip-path="url(#r2)" x="48" y="241" font-size="17" fill="#4f46e5" filter="url(#glow)">&lt; UI/UX Architect /&gt;</text>
<text clip-path="url(#r3)" x="48" y="241" font-size="17" fill="#4f46e5" filter="url(#glow)">&lt; Creative Coder /&gt;</text>
<text clip-path="url(#r4)" x="48" y="241" font-size="17" fill="#4f46e5" filter="url(#glow)">&lt; Open Source Contributor /&gt;</text>
<rect x="48" y="228" width="2.5" height="16" fill="#4f46e5" opacity="0"><animate attributeName="opacity" values="1;0" dur=".8s" repeatCount="indefinite" begin="2.9s"/></rect>

<!-- Quote box -->
<g class="cl" style="animation:fadeIn .5s ease 3.2s forwards">
  <rect x="48" y="262" width="380" height="72" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <rect x="48" y="266" width="3.5" height="64" rx="1.5" fill="#2563eb"/>
</g>
<text clip-path="url(#q1)" x="76" y="292" font-size="15" fill="#334155">I don't just build webs,</text>
<text clip-path="url(#q2)" x="76" y="318" font-size="15"><tspan fill="#334155">I </tspan><tspan fill="#2563eb" font-weight="bold">code</tspan><tspan fill="#334155"> experiences.</tspan></text>
<g class="tw" style="animation-delay:.9s"><path d="M400 288l2.4 6.4 6.4 2.4-6.4 2.4-2.4 6.4-2.4-6.4-6.4-2.4 6.4-2.4z" fill="#4f46e5"/></g>

<!-- Tech I Know -->
<text class="ii" x="48" y="374" font-size="15" fill="#4f46e5" font-weight="bold" style="animation:fadeIn .4s ease 4.6s forwards">🧩 Tech I Know</text>
<g class="pill" style="animation:fadeIn .3s ease 4.8s forwards"><rect x="48" y="388" width="76" height="26" rx="13" fill="rgba(37,99,235,.13)" stroke="#2563eb" stroke-width="1"/><text x="86" y="405" text-anchor="middle" font-size="12" fill="#1d4ed8" font-weight="bold">React</text></g>
<g class="pill" style="animation:fadeIn .3s ease 4.9s forwards"><rect x="132" y="388" width="70" height="26" rx="13" fill="rgba(79,70,229,.15)" stroke="#4f46e5" stroke-width="1"/><text x="167" y="405" text-anchor="middle" font-size="12" fill="#4338ca" font-weight="bold">CSS</text></g>
<g class="pill" style="animation:fadeIn .3s ease 5s forwards"><rect x="210" y="388" width="110" height="26" rx="13" fill="rgba(2,132,199,.10)" stroke="#0284c7" stroke-width="1"/><text x="265" y="405" text-anchor="middle" font-size="12" fill="#0369a1" font-weight="bold">TypeScript</text></g>
<g class="pill" style="animation:fadeIn .3s ease 5.1s forwards"><rect x="328" y="388" width="80" height="26" rx="13" fill="rgba(124,58,237,.10)" stroke="#7c3aed" stroke-width="1"/><text x="368" y="405" text-anchor="middle" font-size="12" fill="#6d28d9" font-weight="bold">Node.js</text></g>
<g class="pill" style="animation:fadeIn .3s ease 5.2s forwards"><rect x="48" y="422" width="74" height="26" rx="13" fill="rgba(29,78,216,.14)" stroke="#1d4ed8" stroke-width="1"/><text x="85" y="439" text-anchor="middle" font-size="12" fill="#1e40af" font-weight="bold">Docker</text></g>
<g class="pill" style="animation:fadeIn .3s ease 5.3s forwards"><rect x="130" y="422" width="64" height="26" rx="13" fill="rgba(109,40,217,.14)" stroke="#6d28d9" stroke-width="1"/><text x="162" y="439" text-anchor="middle" font-size="12" fill="#5b21b6" font-weight="bold">SQL</text></g>
<g class="pill" style="animation:fadeIn .3s ease 5.4s forwards"><rect x="202" y="422" width="130" height="26" rx="13" fill="rgba(37,99,235,.10)" stroke="#2563eb" stroke-width="1"/><text x="257" y="439" text-anchor="middle" font-size="12" fill="#1d4ed8" font-weight="bold">Responsive UI</text></g>

<!-- About Me -->
<text class="ii" x="48" y="490" font-size="15" fill="#2563eb" font-weight="bold" style="animation:fadeIn .4s ease 5.6s forwards">👨‍💻 About Me</text>
<text class="ii" x="48" y="516" font-size="13.5" style="animation:fadeIn .4s ease 5.8s forwards"><tspan fill="#1e40af">&gt;_ </tspan><tspan fill="#475569">I build responsive, user-friendly and beautiful web experiences.</tspan></text>
<text class="ii" x="48" y="540" font-size="13.5" style="animation:fadeIn .4s ease 6s forwards"><tspan fill="#2563eb">💡 </tspan><tspan fill="#475569">Always learning, always building.</tspan></text>
<text class="ii" x="48" y="564" font-size="13.5" style="animation:fadeIn .4s ease 6.2s forwards"><tspan fill="#4f46e5">🚀 </tspan><tspan fill="#475569">Turning ideas into real world solutions.</tspan></text>

<!-- Stats card -->
<g class="st" style="animation:fadeIn .5s ease 6.4s forwards">
  <rect x="48" y="586" width="560" height="66" rx="12" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="188" y1="598" x2="188" y2="640" class="sep"/>
  <line x1="328" y1="598" x2="328" y2="640" class="sep"/>
  <line x1="468" y1="598" x2="468" y2="640" class="sep"/>
  <text x="118" y="612" text-anchor="middle" font-size="11.5" fill="#64748b">📦 Repos</text>
