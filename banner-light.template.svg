<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 1280 740" width="1280" height="740" role="img" aria-label="Developer Portfolio Banner">
<title>Developer — Portfolio Banner</title>
<defs>
<style type="text/css"><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Fira+Code:wght@400;700&display=swap');
text{font-family:'Fira Code','SFMono-Regular',Consolas,monospace}
.name-text{font-family:'Outfit',-apple-system,sans-serif}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popIn{0%{opacity:0;transform:translateY(14px) scale(.7)}70%{opacity:1;transform:translateY(-3px) scale(1.06)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
@keyframes floaty{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}
@keyframes floaty2{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(6deg)}}
@keyframes heartBeat{0%,100%{transform:scale(1)}12%{transform:scale(1.25)}24%{transform:scale(1)}36%{transform:scale(1.18)}48%{transform:scale(1)}}
@keyframes twinkle{0%,100%{opacity:0;transform:scale(.4)}50%{opacity:1;transform:scale(1)}}
@keyframes rise{0%{transform:translateY(0);opacity:0}12%{opacity:.55}88%{opacity:.55}100%{transform:translateY(-46px);opacity:0}}
.ltr{opacity:0;animation:popIn .5s cubic-bezier(.2,.8,.3,1.3) forwards;transform-box:fill-box;transform-origin:center bottom}
.ii,.pill,.soc,.st,.cl{opacity:0}
.pill{transition:transform .2s ease,filter .2s ease;transform-box:fill-box;transform-origin:center;cursor:pointer}
.pill:hover{transform:scale(1.08);filter:brightness(1.35)}
.cur{animation:blink 1s step-end infinite}
.tw{transform-box:fill-box;transform-origin:center;animation:twinkle 2.6s ease-in-out infinite}
.hb{transform-box:fill-box;transform-origin:center;animation:heartBeat 2.2s ease-in-out infinite}
.fl{animation:floaty 5s ease-in-out infinite}
.fl2{transform-box:fill-box;transform-origin:center;animation:floaty2 4.2s ease-in-out infinite}
.np{animation:neonPulse 2.6s ease-in-out infinite}
.rp{animation:rise linear infinite}
.sep{stroke:#e2e8f0;stroke-width:1;opacity:.7}
]]></style>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#ffffff"/><stop offset="55%" stop-color="#f8fafc"/><stop offset="100%" stop-color="#f1f5f9"/>
</linearGradient>
<linearGradient id="nameg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%"><animate attributeName="stop-color" values="#2563eb;#4f46e5;#7c3aed;#2563eb" dur="7s" repeatCount="indefinite"/></stop>
  <stop offset="55%"><animate attributeName="stop-color" values="#3b82f6;#818cf8;#2563eb;#3b82f6" dur="7s" repeatCount="indefinite"/></stop>
  <stop offset="100%"><animate attributeName="stop-color" values="#7c3aed;#2563eb;#818cf8;#7c3aed" dur="7s" repeatCount="indefinite"/></stop>
</linearGradient>
<linearGradient id="borderg" x1="0" y1="0" x2="1" y2="1">
  <stop offset="0%" stop-color="#2563eb" stop-opacity=".55"/>
  <stop offset="50%" stop-color="#4f46e5" stop-opacity=".5"/>
  <stop offset="100%" stop-color="#7c3aed" stop-opacity=".55"/>
</linearGradient>
<radialGradient id="orbP"><stop offset="0%" stop-color="#2563eb" stop-opacity=".09"/><stop offset="100%" stop-color="#2563eb" stop-opacity="0"/></radialGradient>
<radialGradient id="orbV"><stop offset="0%" stop-color="#7c3aed" stop-opacity=".10"/><stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/></radialGradient>
<radialGradient id="orbB"><stop offset="0%" stop-color="#0284c7" stop-opacity=".07"/><stop offset="100%" stop-color="#0284c7" stop-opacity="0"/></radialGradient>
<radialGradient id="girlGlow"><stop offset="0%" stop-color="#4f46e5" stop-opacity=".10"/><stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/></radialGradient>
<filter id="glow"><feGaussianBlur stdDeviation="2.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<filter id="glowBig"><feGaussianBlur stdDeviation="6" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
<pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse"><circle cx="15" cy="15" r=".6" fill="rgba(79,70,229,.08)"/></pattern>

<clipPath id="cPrompt"><rect x="48" y="48" width="0" height="32"><animate attributeName="width" from="0" to="480" dur="1s" begin=".3s" fill="freeze"/></rect></clipPath>
<clipPath id="cHi"><rect x="48" y="86" width="0" height="42"><animate attributeName="width" from="0" to="200" dur=".5s" begin="1.2s" fill="freeze"/></rect></clipPath>
<clipPath id="q1"><rect x="76" y="258" width="0" height="46"><animate attributeName="width" from="0" to="300" dur=".7s" begin="3.4s" fill="freeze"/></rect></clipPath>
<clipPath id="q2"><rect x="76" y="284" width="0" height="46"><animate attributeName="width" from="0" to="300" dur=".6s" begin="4.2s" fill="freeze"/></rect></clipPath>

<!-- Cycling roles: 4 roles, 24s -->
<clipPath id="r1"><rect x="48" y="216" width="0" height="36"><animate attributeName="width" values="0;0;300;300;0;0" keyTimes="0;.01;.07;.2;.24;1" dur="24s" repeatCount="indefinite" begin="2.9s"/></rect></clipPath>
<clipPath id="r2"><rect x="48" y="216" width="0" height="36"><animate attributeName="width" values="0;0;300;300;0;0" keyTimes="0;.26;.32;.45;.49;1" dur="24s" repeatCount="indefinite" begin="2.9s"/></rect></clipPath>
<clipPath id="r3"><rect x="48" y="216" width="0" height="36"><animate attributeName="width" values="0;0;300;300;0;0" keyTimes="0;.51;.57;.7;.74;1" dur="24s" repeatCount="indefinite" begin="2.9s"/></rect></clipPath>
<clipPath id="r4"><rect x="48" y="216" width="0" height="36"><animate attributeName="width" values="0;0;300;300;0;0" keyTimes="0;.76;.82;.95;.99;1" dur="24s" repeatCount="indefinite" begin="2.9s"/></rect></clipPath>

<clipPath id="girlReveal"><rect x="722" y="152" width="558" height="0">
  <animate attributeName="height" from="0" to="522" dur="1.8s" begin=".5s" fill="freeze"/>
</rect></clipPath>
<clipPath id="girlBox"><rect x="722" y="152" width="558" height="522"/></clipPath>
<clipPath id="bannerBox"><rect x="1" y="1" width="1278" height="738" rx="22"/></clipPath>
</defs>

<!-- ================= BACKGROUND ================= -->
<rect width="1280" height="740" rx="22" fill="url(#bg)"/>
<rect width="1280" height="740" rx="22" fill="url(#dots)"/>
<circle cx="230" cy="220" r="260" fill="url(#orbP)"><animate attributeName="r" values="260;290;260" dur="6s" repeatCount="indefinite"/></circle>
<circle cx="1000" cy="520" r="300" fill="url(#orbV)"><animate attributeName="r" values="300;330;300" dur="7s" repeatCount="indefinite"/></circle>
<circle cx="700" cy="120" r="200" fill="url(#orbB)"><animate attributeName="r" values="200;225;200" dur="5.5s" repeatCount="indefinite"/></circle>
<rect x="1" y="1" width="1278" height="738" rx="22" fill="none" stroke="url(#borderg)" stroke-width="1.5"/>

<!-- rising particles -->
<circle class="rp" cx="140" cy="620" r="1.4" fill="#2563eb" style="animation-duration:5s"/>
<circle class="rp" cx="420" cy="700" r="1.1" fill="#4f46e5" style="animation-duration:6s;animation-delay:1s"/>
<circle class="rp" cx="620" cy="660" r="1.3" fill="#7c3aed" style="animation-duration:4.6s;animation-delay:2s"/>
<circle class="rp" cx="1180" cy="690" r="1.2" fill="#2563eb" style="animation-duration:5.4s;animation-delay:.6s"/>
<circle class="rp" cx="1240" cy="360" r="1" fill="#4f46e5" style="animation-duration:6.4s;animation-delay:1.6s"/>
<circle class="rp" cx="70" cy="420" r="1" fill="#7c3aed" style="animation-duration:5.8s;animation-delay:2.4s"/>

<!-- sparkles -->
<g class="tw" style="animation-delay:.4s"><path d="M470 120l3 8 8 3-8 3-3 8-3-8-8-3 8-3z" fill="#3b82f6"/></g>
<g class="tw" style="animation-delay:1.5s"><path d="M880 120l2.4 6.4 6.4 2.4-6.4 2.4-2.4 6.4-2.4-6.4-6.4-2.4 6.4-2.4z" fill="#4f46e5"/></g>
<g class="tw" style="animation-delay:2.6s"><path d="M1245 250l2.4 6.4 6.4 2.4-6.4 2.4-2.4 6.4-2.4-6.4-6.4-2.4 6.4-2.4z" fill="#7c3aed"/></g>

<!-- ================= LEFT: CONTENT ================= -->
<!-- Terminal prompt -->
<text clip-path="url(#cPrompt)" x="48" y="69" font-size="14"><tspan fill="#1e40af" font-weight="bold">alex@developer</tspan><tspan fill="#64748b">:~$ </tspan><tspan fill="#334155">cat </tspan><tspan fill="#7c3aed">README.md</tspan></text>
<rect x="454" y="56" width="8" height="16" fill="#1e40af" opacity="0"><animate attributeName="opacity" values="1;0" dur="1s" repeatCount="indefinite" begin="1.35s"/></rect>

<!-- Hi, I'm -->
<text clip-path="url(#cHi)" x="48" y="114" font-size="24" font-weight="bold" fill="#1e293b">Hi, I'm 👋</text>

