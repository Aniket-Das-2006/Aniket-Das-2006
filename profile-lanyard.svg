<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 680" width="420" height="680" role="img" aria-label="Aniket Das ID card lanyard">
<title>Aniket Das — Executive ID Badge</title>
<defs>
<style type="text/css"><![CDATA[
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@600;700;800;900&family=Space+Grotesk:wght@500;600;700&family=Fira+Code:wght@500;700&display=swap');

text { font-family: 'Space Grotesk', 'Fira Code', -apple-system, sans-serif; }

@keyframes settle {
  0% { transform: rotate(0deg) translateY(-680px); }
  18% { transform: rotate(0deg) translateY(0); }
  30% { transform: rotate(13deg); }
  46% { transform: rotate(-9deg); }
  62% { transform: rotate(6deg); }
  78% { transform: rotate(-3.5deg); }
  92% { transform: rotate(1.5deg); }
  100% { transform: rotate(0deg); }
}

@keyframes sway {
  0%, 100% { transform: rotate(-3.5deg); }
  50% { transform: rotate(3.5deg); }
}

@keyframes cardWobble {
  0%, 100% { transform: rotate(2deg); }
  50% { transform: rotate(-2deg); }
}

@keyframes shine {
  0% { transform: translateX(-380px) skewX(-20deg); }
  45%, 100% { transform: translateX(480px) skewX(-20deg); }
}

@keyframes twinkle {
  0%, 100% { opacity: 0.15; transform: scale(0.6); }
  50% { opacity: 1; transform: scale(1.2); }
}

.settle { transform-origin: 210px 6px; animation: settle 3.4s cubic-bezier(.34,1.1,.5,1) forwards; }
.sway { transform-origin: 210px 6px; animation: sway 4.6s ease-in-out 3.4s infinite; }
.wob { transform-origin: 210px 300px; animation: cardWobble 4.6s ease-in-out 3.4s infinite; }
.shine { animation: shine 4s ease-in-out 3.6s infinite; }
.tw { transform-box: fill-box; transform-origin: center; animation: twinkle 3s ease-in-out infinite; }

.lanyard-card-container:hover .wob {
  animation-play-state: paused;
  transform: scale(1.02);
  transition: transform 0.3s ease;
}
]]></style>

<!-- Background Glow Aura -->
<radialGradient id="auraglow" cx="50%" cy="60%" r="50%">
  <stop offset="0%" stop-color="#6366f1" stop-opacity="0.35"/>
  <stop offset="70%" stop-color="#3b82f6" stop-opacity="0.1"/>
  <stop offset="100%" stop-color="#0d1117" stop-opacity="0"/>
</radialGradient>

<!-- Belt Strap Gradient -->
<linearGradient id="strapg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#4f46e5"/>
  <stop offset="50%" stop-color="#818cf8"/>
  <stop offset="100%" stop-color="#3b82f6"/>
</linearGradient>

<!-- Metallic Metal Clasp -->
<linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0%" stop-color="#e2e8f0"/>
  <stop offset="40%" stop-color="#94a3b8"/>
  <stop offset="70%" stop-color="#475569"/>
  <stop offset="100%" stop-color="#cbd5e1"/>
</linearGradient>

<!-- Holographic Glossy Sweep -->
<linearGradient id="shineg" x1="0" y1="0" x2="1" y2="0">
  <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
  <stop offset="45%" stop-color="#ffffff" stop-opacity="0.22"/>
  <stop offset="55%" stop-color="#c4b5fd" stop-opacity="0.28"/>
  <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
</linearGradient>

<!-- Drop Shadows -->
<filter id="cardShadow" x="-20%" y="-10%" width="140%" height="130%">
  <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#030712" flood-opacity="0.8"/>
  <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#6366f1" flood-opacity="0.3"/>
</filter>

<filter id="photoGlow">
  <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.5"/>
</filter>

<!-- Card Geometry Clip -->
<clipPath id="cardclip">
  <rect x="70" y="250" width="280" height="420" rx="22"/>
</clipPath>

<!-- Circular Photo Clip -->
<clipPath id="avatarClip">
  <circle cx="210" cy="375" r="46"/>
</clipPath>
</defs>

<!-- Ambient Glow -->
<circle cx="210" cy="440" r="230" fill="url(#auraglow)"/>

<!-- Twinkling Ambient Stars -->
<g class="tw" style="animation-delay: 0.3s"><path d="M45 170 l3.5 9 9 3.5 -9 3.5 -3.5 9 -3.5 -9 -9 -3.5 9 -3.5 z" fill="#818cf8"/></g>
<g class="tw" style="animation-delay: 1.5s"><path d="M375 260 l3 7.5 7.5 3 -7.5 3 -3 7.5 -3 -7.5 -7.5 -3 7.5 -3 z" fill="#c4b5fd"/></g>
<g class="tw" style="animation-delay: 2.4s"><path d="M40 500 l3 7.5 7.5 3 -7.5 3 -3 7.5 -3 -7.5 -7.5 -3 7.5 -3 z" fill="#3b82f6"/></g>

<!-- Main Lanyard Container -->
<g class="lanyard-card-container">
<g class="settle"><g class="sway">

  <!-- Lanyard Belt / Strap -->
  <g>
    <path d="M189 -6 L231 -6 L227 205 L193 205 Z" fill="url(#strapg)"/>
    <line x1="194.5" y1="0" x2="197" y2="204" stroke="#ffffff" stroke-opacity="0.65" stroke-width="1.2" stroke-dasharray="4 3"/>
    <line x1="225.5" y1="0" x2="223" y2="204" stroke="#ffffff" stroke-opacity="0.65" stroke-width="1.2" stroke-dasharray="4 3"/>
    
    <!-- Text ONLY ON BELT: AI ORCHESTRATOR -->
    <text x="0" y="0" font-family="'Outfit', sans-serif" font-size="11" font-weight="900" fill="#ffffff" letter-spacing="3" transform="translate(215, 18) rotate(90)">
      AI ORCHESTRATOR  ✦  AI ORCHESTRATOR  ✦  AI ORCHESTRATOR
    </text>
  </g>

  <!-- Metal Clasp & Ring -->
  <rect x="186" y="202" width="48" height="24" rx="5" fill="url(#metal)" stroke="#334155" stroke-width="1"/>
  <rect x="197" y="207" width="26" height="7" rx="3.5" fill="#1e293b"/>
  <circle cx="210" cy="235" r="14" fill="none" stroke="url(#metal)" stroke-width="5"/>

  <!-- Card Base + Wobble Group -->
  <g class="wob">
    <!-- Card Background Shadow & Outer Border -->
    <rect x="70" y="250" width="280" height="420" rx="22" fill="#111827" stroke="#6366f1" stroke-width="1.5" filter="url(#cardShadow)"/>

    <!-- Clipped Card Content (Matching "ROSE ANGEL" Layout) -->
    <g clip-path="url(#cardclip)">
      
      <!-- 1. Top Section: White Angled Header -->
      <path d="M 70 250 L 350 250 L 350 310 L 70 365 Z" fill="#ffffff"/>

      <!-- Lanyard Punch Hole at Top Center -->
      <circle cx="210" cy="268" r="10" fill="#111827"/>

      <!-- Top Left Logo: IIM SAMBALPUR -->
      <g transform="translate(85, 274)">
        <!-- Styled IIM Emblem -->
        <circle cx="12" cy="12" r="10" fill="#4f46e5"/>
        <text x="12" y="15" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="7" font-weight="900" fill="#ffffff">IIM</text>
        <text x="26" y="11" font-family="'Outfit', sans-serif" font-size="7.5" font-weight="900" fill="#1e1b4b" letter-spacing="0.5">IIM SAMBALPUR</text>
        <text x="26" y="18" font-family="'Space Grotesk', sans-serif" font-size="5" font-weight="700" fill="#6366f1" letter-spacing="0.5">AUTONOMOUS INST.</text>
      </g>

      <!-- Top Right Logo: MIT -->
      <g transform="translate(295, 274)">
        <circle cx="12" cy="12" r="10" fill="#2563eb"/>
        <text x="12" y="15" text-anchor="middle" font-family="'Outfit', sans-serif" font-size="7" font-weight="900" fill="#ffffff">MIT</text>
      </g>

      <!-- 2. Middle Section: Diagonal Purple & Lavender Bands -->
      <!-- Band 1: Deep Indigo Accent -->
      <path d="M 70 345 L 350 285 L 350 330 L 70 390 Z" fill="#312e81"/>
      
      <!-- Band 2: Vivid Purple / Lavender Main Layer -->
      <path d="M 70 365 L 350 305 L 350 440 L 70 515 Z" fill="#581c87"/>
      <path d="M 70 365 L 350 305 L 350 440 L 70 515 Z" fill="url(#strapg)" opacity="0.85"/>
      
      <!-- Band 3: Dark Charcoal Transition Bar -->
      <path d="M 70 500 L 350 425 L 350 455 L 70 530 Z" fill="#1f2937"/>

      <!-- 3. Lower Section: Dark Body Background -->
      <rect x="70" y="445" width="280" height="225" fill="#111827"/>
      <!-- Angled Top Edge for Dark Section -->
      <path d="M 70 515 L 350 440 L 350 670 L 70 670 Z" fill="#111827"/>

      <!-- 4. Center Double-Ringed Circular Photo (Positioned over the diagonal bands) -->
      <!-- Outer Glossy Purple/Lavender Ring -->
      <circle cx="210" cy="375" r="58" fill="#6b21a8" opacity="0.6" filter="url(#photoGlow)"/>
      <circle cx="210" cy="375" r="56" fill="none" stroke="#a855f7" stroke-width="4"/>
      <circle cx="210" cy="375" r="52" fill="none" stroke="#c084fc" stroke-width="2"/>
      
      <!-- Inner Dark Border Ring -->
      <circle cx="210" cy="375" r="47" fill="#0f172a" stroke="#1e1b4b" stroke-width="2"/>

      <!-- Teenager Male Portrait Photo -->
      <g clip-path="url(#avatarClip)">
        <image href="./avatar.png" x="160" y="325" width="100" height="100" preserveAspectRatio="xMidYMid slice"/>
      </g>

      <!-- 5. Name Section (Matching ROSE ANGEL typography styling) -->
      <!-- First Name "ANIKET" in bold White, Last Name "DAS" in bold Lavender -->
      <text x="210" y="525" text-anchor="middle">
        <tspan font-family="'Outfit', sans-serif" font-size="21" font-weight="900" fill="#ffffff" letter-spacing="1.5">ANIKET </tspan>
        <tspan font-family="'Outfit', sans-serif" font-size="21" font-weight="900" fill="#c084fc" letter-spacing="1.5">DAS</tspan>
      </text>

      <!-- 6. Role Pill Badge (Matching the purple pill button in reference image) -->
      <g transform="translate(140, 535)">
        <rect x="0" y="0" width="140" height="22" rx="11" fill="#4c1d95" stroke="#a855f7" stroke-width="1"/>
        <text x="70" y="15" text-anchor="middle" font-family="'Space Grotesk', sans-serif" font-size="10" font-weight="700" fill="#ffffff" letter-spacing="1">AI Orchestrator</text>
      </g>

      <!-- 7. Align Details List (Matching reference structure) -->
      <g transform="translate(100, 578)" font-family="'Fira Code', monospace" font-size="9" font-weight="500">
        <!-- Line 1: ID -->
        <text x="0" y="0" fill="#9ca3af">ID</text>
        <text x="45" y="0" fill="#e5e7eb">: 2026-IIMS-BSDS</text>

        <!-- Line 2: Phone / Org -->
        <text x="0" y="14" fill="#9ca3af">Org</text>
        <text x="45" y="14" fill="#e5e7eb">: IIM Sambalpur / IIT Madras</text>

        <!-- Line 3: Email -->
        <text x="0" y="28" fill="#9ca3af">Email</text>
        <text x="45" y="28" fill="#c084fc">bsdsai25aniketd@iimsambalpur.ac.in</text>
      </g>

      <!-- 8. White Barcode Container Box -->
      <g transform="translate(160, 616)">
        <rect x="0" y="0" width="100" height="20" rx="3" fill="#ffffff"/>
        <!-- Barcode lines inside -->
        <g fill="#000000" transform="translate(8, 2)">
          <rect x="0" y="0" width="2" height="12"/><rect x="3" y="0" width="1" height="12"/>
          <rect x="6" y="0" width="3" height="12"/><rect x="11" y="0" width="1" height="12"/>
          <rect x="14" y="0" width="2" height="12"/><rect x="18" y="0" width="1" height="12"/>
          <rect x="21" y="0" width="4" height="12"/><rect x="27" y="0" width="1" height="12"/>
          <rect x="30" y="0" width="2" height="12"/><rect x="34" y="0" width="3" height="12"/>
          <rect x="39" y="0" width="1" height="12"/><rect x="42" y="0" width="2" height="12"/>
          <rect x="46" y="0" width="1" height="12"/><rect x="49" y="0" width="3" height="12"/>
          <rect x="54" y="0" width="2" height="12"/><rect x="58" y="0" width="1" height="12"/>
          <rect x="61" y="0" width="3" height="12"/><rect x="66" y="0" width="1" height="12"/>
          <rect x="69" y="0" width="2" height="12"/><rect x="73" y="0" width="3" height="12"/>
          <rect x="78" y="0" width="1" height="12"/><rect x="81" y="0" width="2" height="12"/>
        </g>
        <text x="50" y="18" text-anchor="middle" font-family="'Fira Code', monospace" font-size="5" font-weight="700" fill="#000000">PZN - 8908802</text>
      </g>

      <!-- 9. Footer URL in Bracket (Matching [ www.graphicsfamily.com ] in reference) -->
      <g transform="translate(130, 650)">
        <text x="75" y="0" text-anchor="middle" font-family="'Fira Code', monospace" font-size="7" font-weight="600" fill="#9ca3af">
          [ www.github.com/Aniket-Das-2006 ]
        </text>
      </g>

      <!-- 10. Bottom Right Purple Corner Slice -->
      <path d="M 350 645 L 350 670 L 310 670 Z" fill="#a855f7"/>

      <!-- 11. Holographic 3D Glass Glossy Reflection Sweep -->
      <rect class="shine" x="70" y="240" width="130" height="440" fill="url(#shineg)"/>

    </g>
  </g>

</g></g>
</g>

<!-- Bottom Interactive Hint -->
<text x="210" y="674" text-anchor="middle" font-size="9" font-weight="600" fill="#818cf8" opacity="0.8" letter-spacing="1">
  ✦  Hover to inspect Executive ID Card  ✦
</text>

</svg>
