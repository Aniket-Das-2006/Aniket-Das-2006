<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300">
<title>GitHub Octocat Painter Loop</title>
<defs>
  <style type="text/css"><![CDATA[
    @keyframes draw {
      0%   { stroke-dashoffset: 1200; opacity: 0.3; }
      50%  { stroke-dashoffset: 0;    opacity: 1;   }
      75%  { stroke-dashoffset: 0;    opacity: 1;   }
      100% { stroke-dashoffset: 1200; opacity: 0.3; }
    }
    @keyframes glow {
      0%, 100% { filter: drop-shadow(0 0 4px #818cf8); }
      50%      { filter: drop-shadow(0 0 12px #3b82f6); }
    }
    @keyframes brush-move {
      0%   { transform: translate(30px, 250px) rotate(-30deg); }
      25%  { transform: translate(150px, 80px) rotate(-15deg); }
      50%  { transform: translate(250px, 140px) rotate(5deg); }
      75%  { transform: translate(130px, 220px) rotate(-10deg); }
      100% { transform: translate(30px, 250px) rotate(-30deg); }
    }
    .octocat-path {
      fill: none;
      stroke: url(#neon-gradient);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 1200;
      animation: draw 6s ease-in-out infinite, glow 6s ease-in-out infinite;
    }
    .painter-brush {
      animation: brush-move 6s ease-in-out infinite;
    }
  ]]></style>
  <linearGradient id="neon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
    <stop offset="0%" stop-color="#3b82f6"/>
    <stop offset="50%" stop-color="#818cf8"/>
    <stop offset="100%" stop-color="#c4b5fd"/>
  </linearGradient>
</defs>

<!-- Background circle -->
<circle cx="150" cy="150" r="145" fill="#0d1117" stroke="#1e293b" stroke-width="1.5"/>

<!-- Octocat simplified outline (draw & erase loop) -->
<path class="octocat-path" d="
  M150,30
  C90,30 40,75 40,135
  C40,180 65,215 100,235
  C100,245 95,260 95,265
  C95,270 100,270 110,265
  C125,275 175,275 190,265
  C200,270 205,270 205,265
  C205,260 200,245 200,235
  C235,215 260,180 260,135
  C260,75 210,30 150,30
  Z
  M105,120
  C105,110 115,105 125,105
  C135,105 140,110 140,120
  C140,130 135,135 125,135
  C115,135 105,130 105,120
  Z
  M160,120
  C160,110 170,105 180,105
  C190,105 195,110 195,120
  C195,130 190,135 180,135
  C170,135 160,130 160,120
  Z
  M120,170
  C130,180 170,180 180,170
  M90,95
  C75,80 55,90 60,110
  M210,95
  C225,80 245,90 240,110
"/>

<!-- Animated paint brush -->
<g class="painter-brush" opacity="0.8">
  <line x1="0" y1="0" x2="18" y2="-35" stroke="#c4b5fd" stroke-width="3" stroke-linecap="round"/>
  <ellipse cx="0" cy="2" rx="5" ry="3" fill="#818cf8"/>
  <!-- paint drip -->
  <circle cx="1" cy="6" r="2" fill="#3b82f6" opacity="0.7">
    <animate attributeName="cy" values="6;12;6" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Sparkles around the Octocat -->
<circle cx="60" cy="60" r="2" fill="#3b82f6">
  <animate attributeName="opacity" values="0;1;0" dur="2s" repeatCount="indefinite" begin="0s"/>
  <animate attributeName="r" values="1;3;1" dur="2s" repeatCount="indefinite" begin="0s"/>
</circle>
<circle cx="240" cy="50" r="2" fill="#818cf8">
  <animate attributeName="opacity" values="0;1;0" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
  <animate attributeName="r" values="1;3;1" dur="2.5s" repeatCount="indefinite" begin="0.5s"/>
</circle>
<circle cx="250" cy="240" r="2" fill="#c4b5fd">
  <animate attributeName="opacity" values="0;1;0" dur="1.8s" repeatCount="indefinite" begin="1s"/>
  <animate attributeName="r" values="1;3;1" dur="1.8s" repeatCount="indefinite" begin="1s"/>
</circle>
<circle cx="50" cy="230" r="2" fill="#3b82f6">
  <animate attributeName="opacity" values="0;1;0" dur="2.2s" repeatCount="indefinite" begin="0.3s"/>
  <animate attributeName="r" values="1;3;1" dur="2.2s" repeatCount="indefinite" begin="0.3s"/>
</circle>
<circle cx="150" cy="280" r="1.5" fill="#818cf8">
  <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite" begin="1.5s"/>
  <animate attributeName="r" values="1;2.5;1" dur="3s" repeatCount="indefinite" begin="1.5s"/>
</circle>
</svg>
